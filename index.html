<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS | Tactical Mesh Node</title>
    <style>
        :root {
            --bg: #0a0e17;
            --panel: #131a26;
            --accent: #00d2ff;
            --text-main: #e2e8f0;
            --text-muted: #64748b;
            --alert: #ff4757;
            --relay: #00ffcc;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .terminal-container {
            width: 100%;
            max-width: 600px;
            background: var(--panel);
            border: 1px solid rgba(0, 210, 255, 0.2);
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 210, 255, 0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        #startup-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--panel);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: monospace;
            color: var(--accent);
            transition: opacity 0.8s ease-out;
        }

        .loader-text {
            font-size: 1.1rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-align: center;
            padding: 0 20px;
            line-height: 1.5;
        }

        .progress-bar {
            width: 250px;
            height: 4px;
            background: rgba(0, 210, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 50%;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
            animation: scan 1.5s infinite alternate ease-in-out;
        }

        @keyframes scan { 
            from { width: 10%; margin-left: 0; } 
            to { width: 30%; margin-left: 70%; } 
        }

        .header {
            background: rgba(0, 0, 0, 0.4);
            padding: 15px 20px;
            border-bottom: 1px solid rgba(0, 210, 255, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--accent);
            text-transform: uppercase;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: var(--alert);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--alert);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 210, 255, 0.4); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0, 210, 255, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 210, 255, 0); }
        }

        #chat-box {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        .msg-bubble {
            background: rgba(255, 255, 255, 0.03);
            padding: 12px 16px;
            border-radius: 8px;
            border-left: 4px solid var(--accent);
            width: fit-content;
            max-width: 85%;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .msg-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            gap: 20px;
        }

        .sender-id {
            font-size: 0.8rem;
            color: var(--accent);
            font-family: monospace;
            font-weight: bold;
        }

        .hop-tag {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-style: italic;
        }

        .msg-text {
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .input-area {
            display: flex;
            padding: 15px;
            background: rgba(0, 0, 0, 0.4);
            border-top: 1px solid rgba(0, 210, 255, 0.1);
            gap: 10px;
        }

        #user-input {
            width: 110px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(0, 210, 255, 0.3);
            border-radius: 6px;
            color: var(--accent);
            font-weight: bold;
            font-family: monospace;
            outline: none;
        }

        #msg-input {
            flex-grow: 1;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: white;
            outline: none;
        }

        #user-input:focus, #msg-input:focus { border-color: var(--accent); }

        button {
            padding: 0 20px;
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        button:hover {
            background: var(--accent);
            color: var(--bg);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
        }
    </style>
</head>
<body>

    <div class="terminal-container">
        <div id="startup-overlay">
            <div class="loader-text" id="loader-msg">SCANNING LOCAL AIRWAVES...<br>INITIALIZING DECENTRALIZED ARCHITECTURE</div>
            <div class="progress-bar">
                <div class="progress-fill" id="p-fill"></div>
            </div>
        </div>

        <div class="header">
            <h2 class="title">NEXUS MESH-CORE</h2>
            <div class="status-badge">
                <div class="pulse-dot" id="status-dot"></div>
                <span id="status-text">SEARCHING...</span>
            </div>
        </div>
        
        <div id="chat-box">
            <div class="msg-bubble" style="border-left-color: var(--text-muted);">
                <div class="msg-header">
                    <span class="sender-id" style="color: var(--text-muted);">@SYSTEM</span>
                </div>
                <div class="msg-text" style="color: var(--text-muted); font-style: italic;">
                    Mesh-inspired decentralized communication architecture online. Direct-link and Store-and-forward relay protocols active.
                </div>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Your ID">
            <input type="text" id="msg-input" placeholder="Broadcast packet..." onkeypress="handleKeyPress(event)" autocomplete="off">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        let lastMessageCount = 0;
        let isConnected = false;

        document.getElementById('user-input').value = localStorage.getItem('mesh_username') || '';

        function checkNetworkStatus() {
            fetch('/status')
                .then(res => res.json())
                .then(data => {
                    const overlay = document.getElementById('startup-overlay');
                    const msg = document.getElementById('loader-msg');
                    const fill = document.getElementById('p-fill');
                    const statusText = document.getElementById('status-text');
                    const statusDot = document.getElementById('status-dot');

                    if (data.connected && !isConnected) {
                        isConnected = true;
                        fill.style.animation = 'none';
                        fill.style.width = '100%';
                        msg.innerText = "PEER DISCOVERED. NETWORK LINK ESTABLISHED.";
                        msg.style.color = "var(--relay)";
                        
                        statusText.innerText = "Architecture Active";
                        statusDot.style.backgroundColor = "var(--accent)"; 
                        statusDot.style.boxShadow = "0 0 10px var(--accent)";
                        
                        setTimeout(() => { 
                            overlay.style.opacity = '0'; 
                            setTimeout(() => overlay.style.display = 'none', 800);
                        }, 1200);

                    } else if (!data.connected && isConnected) {
                        isConnected = false;
                        statusText.innerText = "PEER LOST. RE-SCANNING...";
                        statusDot.style.backgroundColor = "var(--alert)"; 
                        statusDot.style.boxShadow = "0 0 10px var(--alert)";
                    }
                });
        }

        setInterval(checkNetworkStatus, 2000);

        function sendMessage() {
            const inputField = document.getElementById('msg-input');
            const userField = document.getElementById('user-input');
            const text = inputField.value.trim();
            const username = userField.value.trim() || "Anonymous";
            if (!text) return;

            localStorage.setItem('mesh_username', username);

            fetch('/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username, message: text }) 
            }).then(() => {
                inputField.value = ''; 
                fetchMessages(); 
            });
        }

        function handleKeyPress(e) { if (e.key === 'Enter') sendMessage(); }

        function fetchMessages() {
            fetch('/messages')
                .then(response => response.json())
                .then(data => {
                    const chatBox = document.getElementById('chat-box');
                    if (data.length > lastMessageCount) {
                        chatBox.innerHTML = chatBox.firstElementChild.outerHTML; 
                        
                        data.forEach(msg => {
                            const isAlert = msg.text.toLowerCase().includes("help") || msg.text.toLowerCase().includes("evac");
                            let borderColor = isAlert ? 'var(--alert)' : 'var(--accent)';
                            let idColor = isAlert ? 'var(--alert)' : 'var(--accent)';
                            let boxStyle = `border-left-color: ${borderColor};`;
                            let headerHtml = `<span class="sender-id" style="color: ${idColor};">@${msg.username}</span>`;
                            
                            // NEW: Hop Count Logic for the UI
                            let hopInfo = msg.hops > 0 ? `<span class="hop-tag">Relayed via ${msg.hops} node(s)</span>` : `<span class="hop-tag">Direct Signal</span>`;

                            if (msg.username === localStorage.getItem('mesh_username')) {
                                headerHtml = `<span class="sender-id" style="color: #ffffff;">(Me) @${msg.username}</span>`;
                            }

                            if (msg.is_dm) {
                                headerHtml = `<span class="sender-id" style="color: #ffaa00;">[SECURE RELAY TO @${msg.target}]</span>`;
                                boxStyle = `border-left-color: #ffaa00; background: rgba(255, 170, 0, 0.05);`;
                            }

                            chatBox.innerHTML += `
                                <div class="msg-bubble" style="${boxStyle}">
                                    <div class="msg-header">
                                        ${headerHtml}
                                        ${hopInfo}
                                    </div>
                                    <div class="msg-text">${msg.text}</div>
                                </div>
                            `;
                        });
                        lastMessageCount = data.length;
                        chatBox.scrollTop = chatBox.scrollHeight;
                    }
                });
        }
        setInterval(fetchMessages, 1000);
    </script>
</body>
</html>
